<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Editor</title>
<style>
body { font-family: sans-serif; background: #fafafa; }
.container { max-width: 520px; margin: auto; padding: 10px; }
button { margin: 4px; padding: 6px 12px; }
.grid { display: grid; gap: 4px; margin: 12px 0; width: max-content; }
.dot {
  width: 32px; height: 32px; border: 1px solid #999;
  background: #fff; cursor: pointer; box-sizing: border-box;
}
.dot.on { background: #222; }
.hex-area { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
input { width: 44px; padding: 4px; text-align: center; font-family: monospace; font-size: 20px; }
textarea { width: 100%; height: 60px; font-family: monospace; font-size: 20px; }
</style>
</head>
<body>

<div class="container">
  <h3>ポケコン ドットエディタ</h3>

  <div>
    <button onclick="setMode(5,7)">5×7</button>
    <button onclick="setMode(6,8)">6×8</button>
    <button onclick="clearGrid()">クリア</button>
    <button onclick="invertGrid()">反転</button>
  </div>

  <div>
    <button onclick="flipHorizontal()">左右反転</button>
    <button onclick="flipVertical()">上下反転</button>
  </div>

  <div>
    <button onclick="shiftLeft()">←</button>
    <button onclick="shiftRight()">→</button>
    <button onclick="shiftUp()">↑</button>
    <button onclick="shiftDown()">↓</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="hex" class="hex-area"></div>
  <textarea id="text" readonly></textarea>
</div>

<script>
let cols = 5;
let rows = 7;
let data = [];

function makeEmptyData(c, r) {
  let d = [];
  for (let x = 0; x < c; x++) {
    d[x] = [];
    for (let y = 0; y < r; y++) d[x][y] = 0;
  }
  return d;
}

function init() {
  data = makeEmptyData(cols, rows);
  render();
}

function setMode(newCols, newRows) {
  let oldData = data;
  let oldCols = cols;
  let oldRows = rows;

  cols = newCols;
  rows = newRows;

  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < Math.min(oldCols, cols); x++) {
    for (let y = 0; y < Math.min(oldRows, rows); y++) {
      newData[x][y] = oldData[x][y];
    }
  }

  data = newData;
  render();
}

function render() {
  const g = document.getElementById("grid");
  g.innerHTML = "";
  g.style.gridTemplateColumns = `repeat(${cols}, 32px)`;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      let dot = document.createElement("div");
      dot.className = "dot" + (data[x][y] ? " on" : "");
      dot.onclick = function() {
        data[x][y] = data[x][y] ? 0 : 1;
        render();
      };
      g.appendChild(dot);
    }
  }

  renderHex();
  saveData();
}

function toHex2(v) {
  return v.toString(16).toUpperCase().padStart(2, "0");
}

function renderHex() {
  const h = document.getElementById("hex");
  h.innerHTML = "";

  let values = [];

  for (let x = 0; x < cols; x++) {
    let v = 0;

    for (let y = 0; y < rows; y++) {
      if (data[x][y]) v |= (1 << y);
    }

    values.push(v);

    let input = document.createElement("input");
    input.value = toHex2(v);
    input.dataset.col = x;

    input.onchange = function() {
      let col = parseInt(this.dataset.col, 10);
      let val = parseInt(this.value.replace(/^0x/i, "").replace(/^&/i, ""), 16);
      if (isNaN(val)) val = 0;

      let max = (1 << rows) - 1;
      val &= max;

      for (let y = 0; y < rows; y++) {
        data[col][y] = (val & (1 << y)) ? 1 : 0;
      }

      render();
    };

    input.onkeydown = function(e) {
      if (e.key === "Tab") {
        e.preventDefault();

        let col = parseInt(this.dataset.col, 10);
        let val = parseInt(this.value.replace(/^0x/i, "").replace(/^&/i, ""), 16);
        if (isNaN(val)) val = 0;

        let max = (1 << rows) - 1;
        val &= max;

        for (let y = 0; y < rows; y++) {
          data[col][y] = (val & (1 << y)) ? 1 : 0;
        }

        render();

        let nextCol = e.shiftKey
          ? (col - 1 + cols) % cols
          : (col + 1) % cols;

        setTimeout(function() {
          let nextInput = document.querySelector('input[data-col="' + nextCol + '"]');
          if (nextInput) {
            nextInput.focus();
            nextInput.select();
          }
        }, 0);
      }
    };

    h.appendChild(input);
  }

  document.getElementById("text").value =
    values.map(v => "&" + toHex2(v)).join(",") + "\n" +
    values.map(v => "0x" + toHex2(v)).join(", ");
}

function clearGrid() {
  data = makeEmptyData(cols, rows);
  render();
}

function invertGrid() {
  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      data[x][y] = data[x][y] ? 0 : 1;
    }
  }
  render();
}

function flipHorizontal() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      newData[cols - 1 - x][y] = data[x][y];
    }
  }

  data = newData;
  render();
}

function flipVertical() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      newData[x][rows - 1 - y] = data[x][y];
    }
  }

  data = newData;
  render();
}

function shiftLeft() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      let nx = (x - 1 + cols) % cols;
      newData[nx][y] = data[x][y];
    }
  }

  data = newData;
  render();
}

function shiftRight() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      let nx = (x + 1) % cols;
      newData[nx][y] = data[x][y];
    }
  }

  data = newData;
  render();
}

function shiftUp() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      let ny = (y - 1 + rows) % rows;
      newData[x][ny] = data[x][y];
    }
  }

  data = newData;
  render();
}

function shiftDown() {
  let newData = makeEmptyData(cols, rows);

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      let ny = (y + 1) % rows;
      newData[x][ny] = data[x][y];
    }
  }

  data = newData;
  render();
}

function saveData() {
  const obj = {
    cols: cols,
    rows: rows,
    data: data
  };
  localStorage.setItem("dotEditorData", JSON.stringify(obj));
}

function loadData() {
  const str = localStorage.getItem("dotEditorData");
  if (!str) return;

  try {
    const obj = JSON.parse(str);
    cols = obj.cols;
    rows = obj.rows;
    data = obj.data;
  } catch(e) {
    console.log("load error", e);
  }
}

loadData();
if (!data || data.length === 0) {
  init();
} else {
  render();
}
</script>

</body>
</html>
